<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buildy — AI Agent Marketplace</title>
    <meta
      name="description"
      content="Buildy connects people who build AI agents with people who want to use them. A no-code marketplace to discover and run specialized agents."
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="hero hero--split">
        <div class="container hero-openai-layout">
          <aside class="hero-nav">
            <div class="hero-nav-logo">
              <span class="logo-text">Buildy</span>
            </div>
            <nav class="hero-nav-list" aria-label="Buildy sections">
              <a href="./agents-en.html" class="hero-nav-item">Agents</a>
              <a href="./categories-en.html" class="hero-nav-item">Categories</a>
              <a href="./creators-en.html" class="hero-nav-item">Creators</a>
              <a href="./pricing-en.html" class="hero-nav-item">Pricing</a>
              <a href="./company-en.html" class="hero-nav-item">Company</a>
              <a href="./help-en.html" class="hero-nav-item">Help</a>
            </nav>
            <a href="./index-ja.html" class="hero-nav-lang">日本語</a>
          </aside>

          <div class="hero-main">
            <p class="hero-main-eyebrow">AI AGENT MARKETPLACE</p>
            <h1 class="hero-main-title">Find AI agents</h1>
            <form class="hero-main-search">
              <div class="hero-main-search-row">
                <input
                  type="text"
                  class="hero-main-input"
                  placeholder="Enter keywords"
                  aria-label="Search for AI agents"
                />
                <button type="button" class="hero-main-button">
                  →
                </button>
              </div>
              <div class="hero-main-secondary">
                <a href="./agents-en.html" class="hero-main-link">View all agents</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <div class="logo">
            <span class="logo-mark">B</span>
            <span class="logo-text">Buildy</span>
          </div>
          <p class="footer-copy">
            AI agents, in everyone's hands.
          </p>
        </div>
        <div class="footer-links">
          <a href="./agents-en.html">Product</a>
          <a href="./creators-en.html">For Creators</a>
          <a href="./company-en.html">Company</a>
          <a href="./company-en.html">Contact</a>
          <a href="./index-ja.html" class="footer-lang">日本語</a>
        </div>
        <div class="footer-meta">
          <span>© 2026 Buildy</span>
        </div>
      </div>
    </footer>
    <script src="./app.js" defer></script>
  </body>
</html>
