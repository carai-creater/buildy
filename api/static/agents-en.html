<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agents | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">Home</a>
          <a href="./categories-en.html">Categories</a>
          <a href="./creators-register.html">Register as creator</a>
          <a href="./agent-add.html">Add agent</a>
          <a href="./agents.html" class="page-lang">日本語</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>Agents</h1>
        <p class="page-lead">
          Choose from specialized AI agents, install and run them in one click. Filter by keyword or category.
        </p>

        <div id="agents-empty" class="page-empty" style="display: none;">
          <p>No agents registered yet.</p>
          <p><a href="./creators-register.html" class="btn primary-btn">Register as creator</a>, then <a href="./agent-add.html">add an agent</a>.</p>
        </div>
        <div id="agents-grid" class="page-card-grid"></div>
      </section>
    </main>
    <script>
      (function () {
        const grid = document.getElementById("agents-grid");
        const empty = document.getElementById("agents-empty");
        fetch("/api/agents")
          .then((r) => r.json())
          .then((data) => {
            const agents = data.agents || [];
            if (agents.length === 0) {
              empty.style.display = "block";
              return;
            }
            grid.innerHTML = agents
              .map(
                (a) => `
          <article class="page-agent-card">
            <span class="badge subtle">${escapeHtml(a.category || "Other")}</span>
            <h2>${escapeHtml(a.name)}</h2>
            <p class="page-agent-desc">${escapeHtml(a.shortDescription || "")}</p>
            <p class="page-agent-price">¥${Number(a.pricePerRun) || 0} / run</p>
            <a href="./index.html" class="btn primary-btn">Try it</a>
          </article>
        `
              )
              .join("");
          })
          .catch(() => {
            empty.style.display = "block";
            empty.innerHTML = "<p>Failed to load agents.</p><p><a href=\"./creators-register.html\">Register as creator</a> · <a href=\"./agent-add.html\">Add agent</a></p>";
          });
        function escapeHtml(s) {
          const div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
