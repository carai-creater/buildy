<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>エージェント一覧 | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index-ja.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index-ja.html">トップ</a>
          <a href="./categories.html">カテゴリ</a>
          <a href="./mypage.html">マイページ</a>
          <a href="./creators-register.html">クリエイター登録</a>
          <a href="./creator-dashboard.html">ダッシュボード</a>
          <a href="./agent-add.html">エージェントを追加</a>
          <a href="./agents-en.html" class="page-lang">English</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>エージェント一覧</h1>
        <p class="page-lead">
          クリエイターが Buildy に公開したエージェントだけが表示されます。トップやここから実行できます。
        </p>

        <div id="agents-empty" class="page-empty" style="display: none;">
          <p>クリエイター公開のエージェントはまだありません。</p>
          <p><a href="./creators-register.html" class="btn primary-btn">クリエイター登録</a>のあと、<a href="./agent-add.html">エージェントを追加</a>してください。</p>
        </div>
        <div id="agents-grid" class="page-card-grid"></div>
      </section>
    </main>
    <script>
      (function () {
        const grid = document.getElementById("agents-grid");
        const empty = document.getElementById("agents-empty");
        fetch("/api/agents")
          .then((r) => r.json())
          .then((data) => {
            const agents = data.agents || [];
            if (agents.length === 0) {
              empty.style.display = "block";
              return;
            }
            grid.innerHTML = agents
              .map(
                (a) => `
          <article class="page-agent-card">
            <span class="badge subtle">${escapeHtml(a.category || "その他")}</span>
            <h2>${escapeHtml(a.name)}</h2>
            <p class="page-agent-desc">${escapeHtml(a.shortDescription || "")}</p>
            <p class="page-agent-price">¥${Number(a.pricePerRun) || 0} / 実行</p>
            <a href="./index-ja.html" class="btn primary-btn">使ってみる</a>
          </article>
        `
              )
              .join("");
          })
          .catch(() => {
            empty.style.display = "block";
            empty.innerHTML = "<p>一覧の取得に失敗しました。</p><p><a href=\"./creators-register.html\">クリエイター登録</a> · <a href=\"./agent-add.html\">エージェントを追加</a></p>";
          });
        function escapeHtml(s) {
          const div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
