<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My page | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">Home</a>
          <a href="./agents-en.html">Agents</a>
          <a href="./mypage-en.html">My page</a>
          <a href="./creators-register-en.html">Creator signup</a>
          <a href="./creator-dashboard-en.html">Dashboard</a>
          <a href="./agent-add-en.html">Add agent</a>
          <a href="./index-ja.html" class="page-lang">日本語</a>
        </nav>
      </header>
      <section class="page-main">
        <div id="mypage-login" style="display: none;">
          <h1>My page</h1>
          <p class="page-lead">Sign in to see AI agents you’ve used.</p>
          <div id="mypage-google-area" style="display: none; margin-bottom: 1rem;">
            <button type="button" id="mypage-google-btn" class="btn primary-btn" style="display: inline-flex; align-items: center; gap: 0.5rem;">
              <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continue with Google
            </button>
          </div>
          <p id="mypage-email-divider" style="display: none; margin: 0.75rem 0; color: var(--text-sub); font-size: 0.9rem;">— or sign in with email —</p>
          <form id="user-login-form" class="page-form" style="max-width: 28rem;">
            <label for="user-email">Email</label>
            <input id="user-email" name="email" type="email" required placeholder="you@example.com" />
            <button type="submit" class="btn primary-btn">Sign in</button>
          </form>
          <p id="login-result" style="margin-top: 0.75rem; min-height: 1.5em;"></p>
        </div>
        <div id="mypage-content" style="display: none;">
          <h1>My page</h1>
          <p id="mypage-welcome" class="page-lead"></p>
          <p style="margin-top: 0.5rem;"><button type="button" id="mypage-logout" class="btn">Sign out</button></p>

          <h2 style="margin-top: 2rem;">Agents you’ve used</h2>
          <p class="page-lead">Agents you run from the homepage appear here.</p>
          <div id="mypage-agents" class="page-card-grid"></div>
          <div id="mypage-agents-empty" class="page-empty" style="display: none;">
            <p>You haven’t used any agents yet.</p>
            <p><a href="./index.html" class="btn primary-btn">Find agents</a> / <a href="./agents-en.html">Browse all</a></p>
          </div>

          <p style="margin-top: 2rem;"><a href="./agents-en.html" class="btn primary-btn">Discover more agents</a></p>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var userId = (function () {
          try {
            return localStorage.getItem("buildy_user_id") || "";
          } catch (_) {
            return "";
          }
        })();
        var loginBlock = document.getElementById("mypage-login");
        var contentBlock = document.getElementById("mypage-content");
        var welcomeEl = document.getElementById("mypage-welcome");
        var agentsEl = document.getElementById("mypage-agents");
        var agentsEmpty = document.getElementById("mypage-agents-empty");

        function showLogin() {
          loginBlock.style.display = "block";
          contentBlock.style.display = "none";
          fetch("/api/config")
            .then(function (r) { return r.json(); })
            .then(function (config) {
              if (config.supabaseUrl && config.supabaseAnonKey) {
                var googleArea = document.getElementById("mypage-google-area");
                var emailDivider = document.getElementById("mypage-email-divider");
                if (googleArea) googleArea.style.display = "block";
                if (emailDivider) emailDivider.style.display = "block";
                var redirectTo = window.location.origin + (window.location.pathname.replace(/[^/]+$/, "") || "/") + "auth-callback-en.html?next=user";
                var supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                var googleBtn = document.getElementById("mypage-google-btn");
                if (googleBtn) {
                  googleBtn.addEventListener("click", function () {
                    var loginResult = document.getElementById("login-result");
                    if (loginResult) { loginResult.textContent = "Redirecting to Google…"; loginResult.style.color = ""; }
                    supabaseClient.auth.signInWithOAuth({ provider: "google", options: { redirectTo: redirectTo } })
                      .then(function (res) {
                        if (res.error && loginResult) {
                          loginResult.textContent = "Error: " + (res.error.message || "Google sign-in failed");
                          loginResult.style.color = "#c00";
                        }
                      })
                      .catch(function (err) {
                        if (loginResult) { loginResult.textContent = "Error: " + (err.message || "Google sign-in failed"); loginResult.style.color = "#c00"; }
                      });
                  });
                }
              }
            })
            .catch(function () {});
        }
        function showContent() {
          loginBlock.style.display = "none";
          contentBlock.style.display = "block";
        }

        if (!userId) {
          showLogin();
          var loginForm = document.getElementById("user-login-form");
          var loginResult = document.getElementById("login-result");
          if (loginForm && loginResult) {
            loginForm.addEventListener("submit", function (e) {
              e.preventDefault();
              var email = document.getElementById("user-email").value.trim();
              if (!email) {
                loginResult.textContent = "Please enter your email.";
                loginResult.style.color = "#c00";
                return;
              }
              loginResult.textContent = "Signing in…";
              loginResult.style.color = "";
              fetch("/api/users/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email }),
              })
                .then(function (r) {
                  if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || "Sign-in failed"); });
                  return r.json();
                })
                .then(function (data) {
                  if (data.user && data.user.id) {
                    try {
                      localStorage.setItem("buildy_user_id", data.user.id);
                      if (data.user.email) localStorage.setItem("buildy_user_email", data.user.email);
                    } catch (_) {}
                    location.reload();
                  } else {
                    loginResult.textContent = "Error: Could not load user.";
                    loginResult.style.color = "#c00";
                  }
                })
                .catch(function (err) {
                  loginResult.textContent = "Error: " + (err.message || "Network error");
                  loginResult.style.color = "#c00";
                });
            });
          }
          return;
        }

        showContent();
        fetch("/api/users/" + encodeURIComponent(userId) + "/agents")
          .then(function (r) {
            if (!r.ok) throw new Error("Failed to load");
            return r.json();
          })
          .then(function (data) {
            var user = data.user || {};
            var displayName = user.name || user.email || "Guest";
            welcomeEl.textContent = "Welcome, " + displayName + ".";
            var agents = data.agents || [];
            if (agents.length === 0) {
              agentsEl.innerHTML = "";
              if (agentsEmpty) agentsEmpty.style.display = "block";
              return;
            }
            if (agentsEmpty) agentsEmpty.style.display = "none";
            agentsEl.innerHTML = agents
              .map(function (a) {
                var name = (a.name || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                var cat = (a.category || "Other").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                var desc = (a.shortDescription || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                var price = Number(a.pricePerRun) || 0;
                return (
                  '<article class="page-agent-card">' +
                  '<span class="badge subtle">' + cat + "</span>" +
                  "<h2>" + name + "</h2>" +
                  '<p class="page-agent-desc">' + desc + "</p>" +
                  '<p class="page-agent-price">¥' + price + " / run</p>" +
                  '<p style="margin-top: 0.75rem;"><a href="./pay-en.html?agent=' +
                  encodeURIComponent(a.id) +
                  '" class="btn primary-btn">Use</a></p>' +
                  "</article>"
                );
              })
              .join("");
          })
          .catch(function () {
            welcomeEl.textContent = "Welcome.";
            if (agentsEmpty) {
              agentsEmpty.style.display = "block";
              agentsEmpty.innerHTML = "<p>Could not load data. Please refresh and try again.</p>";
            }
          });

        var logoutBtn = document.getElementById("mypage-logout");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", function () {
            try {
              localStorage.removeItem("buildy_user_id");
              localStorage.removeItem("buildy_user_email");
            } catch (_) {}
            location.reload();
          });
        }
      })();
    </script>
  </body>
</html>
