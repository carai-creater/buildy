<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit agent | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">Home</a>
          <a href="./agents-en.html">Agents</a>
          <a href="./creator-dashboard-en.html">Dashboard</a>
          <a href="./agent-add-en.html">Add agent</a>
          <a href="./agent-edit.html" class="page-lang" id="agent-edit-lang-ja">日本語</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>Edit agent</h1>
        <p id="edit-loading" class="page-lead">Loading…</p>
        <form id="agent-form" class="page-form" style="max-width: 32rem; display: none;">
          <label for="github_repo">GitHub repository *</label>
          <input id="github_repo" name="github_repo" type="text" required autocomplete="off" />
          <label for="public_ui_url">End-user UI URL * (HTTPS)</label>
          <input id="public_ui_url" name="public_ui_url" type="url" required autocomplete="off" />
          <label for="name">Agent name *</label>
          <input id="name" name="name" type="text" required />
          <label for="category">Category</label>
          <input id="category" name="category" type="text" />
          <label for="shortDescription">Short description</label>
          <textarea id="shortDescription" name="shortDescription" rows="2"></textarea>
          <label for="pricePerRun">Price per run (JPY)</label>
          <input id="pricePerRun" name="pricePerRun" type="number" min="0" />
          <label for="system_prompt">System prompt (for the LLM)</label>
          <p style="margin: 0 0 0.5rem;">
            <button type="button" id="btn-preview-github-prompt" class="btn secondary-btn" style="font-size: 14px;">Preview from GitHub</button>
            <button type="button" id="btn-sync-github-save" class="btn secondary-btn" style="font-size: 14px;">Sync from GitHub &amp; save</button>
          </p>
          <p id="github-prompt-status" style="font-size: 13px; color: var(--text-sub); min-height: 1.25em;"></p>
          <textarea id="system_prompt" name="system_prompt" rows="4"></textarea>
          <button type="submit" class="btn primary-btn">Save</button>
        </form>
        <p id="agent-result" style="margin-top: 1rem;"></p>
      </section>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
        if (!id) {
          document.getElementById("edit-loading").textContent = "No agent ID in the URL.";
          return;
        }
        const form = document.getElementById("agent-form");
        const loadingEl = document.getElementById("edit-loading");
        const resultEl = document.getElementById("agent-result");
        const ghStatus = document.getElementById("github-prompt-status");
        document.getElementById("btn-preview-github-prompt").addEventListener("click", function () {
          var repo = document.getElementById("github_repo").value.trim();
          ghStatus.textContent = "";
          ghStatus.style.color = "";
          if (!repo) {
            ghStatus.textContent = "Enter the GitHub repository.";
            ghStatus.style.color = "#c00";
            return;
          }
          ghStatus.textContent = "Loading…";
          fetch("/api/github/repo-prompt?repo=" + encodeURIComponent(repo))
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, j: j };
              });
            })
            .then(function (x) {
              if (!x.ok) {
                ghStatus.textContent = (x.j && (x.j.message || x.j.error)) || "Failed";
                ghStatus.style.color = "#c00";
                return;
              }
              ghStatus.style.color = "";
              ghStatus.textContent = "Preview (not saved): " + (x.j.sourcePath || "");
              document.getElementById("system_prompt").value = x.j.text || "";
            })
            .catch(function () {
              ghStatus.textContent = "Network error";
              ghStatus.style.color = "#c00";
            });
        });
        document.getElementById("btn-sync-github-save").addEventListener("click", function () {
          ghStatus.textContent = "Syncing…";
          ghStatus.style.color = "";
          fetch("/api/agents/" + encodeURIComponent(id) + "/sync-github-prompt", { method: "POST" })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, j: j };
              });
            })
            .then(function (x) {
              if (!x.ok) {
                ghStatus.textContent = (x.j && (x.j.message || x.j.error)) || "Sync failed";
                ghStatus.style.color = "#c00";
                return null;
              }
              ghStatus.style.color = "";
              ghStatus.textContent = "Saved (" + (x.j.sourcePath || "") + ")";
              return fetch("/api/agents/" + encodeURIComponent(id)).then(function (r) {
                return r.json();
              });
            })
            .then(function (data) {
              if (data && data.agent) {
                document.getElementById("system_prompt").value = data.agent.system_prompt || "";
              }
            })
            .catch(function () {
              ghStatus.textContent = "Network error";
              ghStatus.style.color = "#c00";
            });
        });
        fetch("/api/agents/" + encodeURIComponent(id))
          .then((r) => (r.ok ? r.json() : Promise.reject(r)))
          .then((data) => {
            const a = data.agent;
            if (!a) return Promise.reject(new Error("Not found"));
            loadingEl.style.display = "none";
            form.style.display = "block";
            document.getElementById("name").value = a.name || "";
            document.getElementById("category").value = a.category || "";
            document.getElementById("shortDescription").value = a.shortDescription || "";
            document.getElementById("pricePerRun").value = a.pricePerRun ?? 0;
            document.getElementById("system_prompt").value = a.system_prompt || "";
            document.getElementById("github_repo").value = a.githubRepo || "";
            document.getElementById("public_ui_url").value = a.publicUiUrl || "";
          })
          .catch(() => {
            loadingEl.textContent = "Could not load this agent.";
          });
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          const payload = {
            name: document.getElementById("name").value.trim(),
            category: document.getElementById("category").value.trim() || undefined,
            shortDescription: document.getElementById("shortDescription").value.trim() || undefined,
            pricePerRun: parseInt(document.getElementById("pricePerRun").value, 10) || 0,
            system_prompt: document.getElementById("system_prompt").value.trim() || undefined,
            github_repo: document.getElementById("github_repo").value.trim(),
            public_ui_url: document.getElementById("public_ui_url").value.trim(),
          };
          resultEl.textContent = "Saving…";
          fetch("/api/agents/" + encodeURIComponent(id), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          })
            .then((r) => r.json())
            .then((data) => {
              if (data.agent) {
                resultEl.innerHTML = "Saved. → <a href=\"./creator-dashboard-en.html\">Dashboard</a>";
              } else {
                resultEl.textContent = "Error: " + (data.error || "Save failed");
              }
            })
            .catch(() => {
              resultEl.textContent = "Network error.";
            });
        });
      })();
      (function () {
        var id = new URLSearchParams(location.search).get("id");
        var a = document.getElementById("agent-edit-lang-ja");
        if (a && id) a.href = "./agent-edit.html?id=" + encodeURIComponent(id);
      })();
    </script>
  </body>
</html>
