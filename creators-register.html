<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クリエイター登録 | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">トップ</a>
          <a href="./agents.html">エージェント</a>
          <a href="./creator-dashboard.html">ダッシュボード</a>
          <a href="./agent-add.html">エージェントを追加</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>クリエイター登録</h1>
        <p class="page-lead">Buildy でエージェントを公開するには、まずクリエイターとして登録してください。</p>
        <form id="register-form" class="page-form" style="max-width: 28rem;">
          <label for="name">表示名</label>
          <input id="name" name="name" type="text" required placeholder="山田 太郎" />
          <label for="email">メールアドレス</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
          <button type="submit" class="btn primary-btn">登録する</button>
        </form>
        <p id="register-result" style="margin-top: 1rem; min-height: 1.5em;"></p>
      </section>
    </main>
    <script>
      (function () {
        var form = document.getElementById("register-form");
        var resultEl = document.getElementById("register-result");
        if (!form || !resultEl) return;
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var name = document.getElementById("name").value.trim();
          var email = document.getElementById("email").value.trim();
          if (!name || !email) {
            resultEl.textContent = "表示名とメールアドレスを入力してください。";
            resultEl.style.color = "#c00";
            return;
          }
          resultEl.textContent = "登録中…";
          resultEl.style.color = "";
          var btn = form.querySelector('button[type="submit"]');
          if (btn) btn.disabled = true;
          fetch("/api/creators/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name, email: email }),
          })
            .then(function (r) {
              if (!r.ok) return r.text().then(function (t) { throw new Error(r.status + " " + t); });
              return r.json();
            })
            .then(function (data) {
              if (data.creator) {
                try { localStorage.setItem("buildy_creator_id", data.creator.id); } catch (_) {}
                window.location.href = "./creator-dashboard.html?registered=1";
              } else {
                resultEl.textContent = "エラー: " + (data.error || "登録に失敗しました");
                resultEl.style.color = "#c00";
                if (btn) btn.disabled = false;
              }
            })
            .catch(function (err) {
              resultEl.textContent = "通信エラーです。(" + (err.message || "") + ")";
              resultEl.style.color = "#c00";
              if (btn) btn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
