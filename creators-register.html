<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クリエイター登録 | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">トップ</a>
          <a href="./agents.html">エージェント</a>
          <a href="./agent-add.html">エージェントを追加</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>クリエイター登録</h1>
        <p class="page-lead">Buildy でエージェントを公開するには、まずクリエイターとして登録してください。</p>
        <form id="register-form" class="page-form" style="max-width: 28rem;">
          <label for="name">表示名</label>
          <input id="name" name="name" type="text" required placeholder="山田 太郎" />
          <label for="email">メールアドレス</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
          <button type="submit" class="btn primary-btn">登録する</button>
        </form>
        <p id="register-result" style="margin-top: 1rem;"></p>
      </section>
    </main>
    <script>
      document.getElementById("register-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const resultEl = document.getElementById("register-result");
        resultEl.textContent = "登録中…";
        fetch("/api/creators/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email }),
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.creator) {
              resultEl.textContent = "登録しました。ID: " + data.creator.id + "（エージェント追加時に使用します）";
              try {
                localStorage.setItem("buildy_creator_id", data.creator.id);
              } catch (_) {}
            } else {
              resultEl.textContent = "エラー: " + (data.error || "登録に失敗しました");
            }
          })
          .catch(() => {
            resultEl.textContent = "通信エラーです。";
          });
      });
    </script>
  </body>
</html>
