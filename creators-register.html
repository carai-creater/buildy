<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クリエイター登録 | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index-ja.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index-ja.html">トップ</a>
          <a href="./agents.html">エージェント</a>
          <a href="./creator-dashboard.html">ダッシュボード</a>
          <a href="./agent-add.html">エージェントを追加</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>クリエイター登録</h1>
        <p class="page-lead">Buildy でエージェントを公開するには、まずクリエイターとして登録してください。</p>
        <p id="register-loading" class="page-lead" style="margin-bottom: 1rem; color: var(--text-sub);">接続設定を確認しています…</p>
        <div id="register-with-auth" style="display: none;">
          <p class="page-lead" style="margin-bottom: 1rem;">Googleで登録するか、メール・パスワードで登録してください。</p>
          <p style="margin-bottom: 1rem;">
            <button type="button" id="google-signup-btn" class="btn primary-btn" style="display: inline-flex; align-items: center; gap: 0.5rem;">
              <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Googleで登録
            </button>
          </p>
          <p style="margin: 0.75rem 0; color: var(--text-sub); font-size: 0.9rem;">— または メールで登録 —</p>
          <form id="register-form-auth" class="page-form" style="max-width: 28rem;">
            <label for="name">表示名</label>
            <input id="name" name="name" type="text" required placeholder="山田 太郎" />
            <label for="email">メールアドレス</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com" />
            <label for="password">パスワード（6文字以上）</label>
            <input id="password" name="password" type="password" required minlength="6" placeholder="********" autocomplete="new-password" />
            <button type="submit" class="btn primary-btn">登録する</button>
          </form>
        </div>
        <div id="register-no-auth" style="display: none;">
          <p class="page-lead" style="margin-bottom: 1rem;">表示名とメールアドレスで登録します。パスワードやGoogleで登録するには、Supabase の URL と anon キーを環境変数に設定してください。</p>
          <form id="register-form" class="page-form" style="max-width: 28rem;">
            <label for="name2">表示名</label>
            <input id="name2" name="name" type="text" required placeholder="山田 太郎" />
            <label for="email2">メールアドレス</label>
            <input id="email2" name="email" type="email" required placeholder="you@example.com" />
            <button type="submit" class="btn primary-btn">登録する</button>
          </form>
        </div>
        <p id="register-result" style="margin-top: 1rem; min-height: 1.5em;"></p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var resultEl = document.getElementById("register-result");
        var withAuth = document.getElementById("register-with-auth");
        var noAuth = document.getElementById("register-no-auth");
        var formAuth = document.getElementById("register-form-auth");
        var form = document.getElementById("register-form");
        var loadingEl = document.getElementById("register-loading");

        function hideRegisterLoading() {
          if (loadingEl) loadingEl.style.display = "none";
        }

        fetch("/api/config")
          .then(function (r) { return r.json(); })
          .then(function (config) {
            hideRegisterLoading();
            if (config.supabaseUrl && config.supabaseAnonKey) {
              withAuth.style.display = "block";
              noAuth.style.display = "none";
              var redirectTo = window.location.origin + (window.location.pathname.replace(/[^/]+$/, "") || "/") + "auth-callback.html";
              var supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
              var googleBtn = document.getElementById("google-signup-btn");
              if (googleBtn) {
                googleBtn.addEventListener("click", function () {
                  resultEl.textContent = "Googleにリダイレクトしています…";
                  resultEl.style.color = "";
                  supabaseClient.auth.signInWithOAuth({
                    provider: "google",
                    options: { redirectTo: redirectTo },
                  }).then(function (res) {
                    if (res.error) {
                      resultEl.textContent = "エラー: " + (res.error.message || "Googleログインに失敗しました");
                      resultEl.style.color = "#c00";
                    }
                  }).catch(function (err) {
                    resultEl.textContent = "エラー: " + (err.message || "Googleログインに失敗しました");
                    resultEl.style.color = "#c00";
                  });
                });
              }
              if (formAuth) {
                formAuth.addEventListener("submit", function (e) {
                  e.preventDefault();
                  var name = document.getElementById("name").value.trim();
                  var email = document.getElementById("email").value.trim();
                  var password = document.getElementById("password").value;
                  if (!name || !email) {
                    resultEl.textContent = "表示名とメールアドレスを入力してください。";
                    resultEl.style.color = "#c00";
                    return;
                  }
                  if (password.length < 6) {
                    resultEl.textContent = "パスワードは6文字以上にしてください。";
                    resultEl.style.color = "#c00";
                    return;
                  }
                  resultEl.textContent = "登録中…";
                  resultEl.style.color = "";
                  var btn = formAuth.querySelector('button[type="submit"]');
                  if (btn) btn.disabled = true;
                  var redirectTo = window.location.origin + (window.location.pathname.replace(/[^/]+$/, "") || "/") + "auth-callback.html";
                  window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey).auth.signUp({
                    email: email,
                    password: password,
                    options: {
                      data: { name: name },
                      emailRedirectTo: redirectTo,
                    },
                  })
                    .then(function (res) {
                      if (res.error) throw new Error(res.error.message);
                      resultEl.textContent = "確認メールを送りました。メール内のリンクをクリックして、本人確認を完了してください。";
                      resultEl.style.color = "";
                      if (btn) btn.disabled = false;
                    })
                    .catch(function (err) {
                      resultEl.textContent = "エラー: " + (err.message || "登録に失敗しました");
                      resultEl.style.color = "#c00";
                      if (btn) btn.disabled = false;
                    });
                });
              }
            } else {
              withAuth.style.display = "none";
              noAuth.style.display = "block";
              if (resultEl && config.envHint) {
                resultEl.textContent = config.envHint;
                resultEl.style.color = "var(--text-sub)";
              }
              if (!form || !resultEl) return;
              form.addEventListener("submit", function (e) {
                e.preventDefault();
                var name = document.getElementById("name2").value.trim();
                var email = document.getElementById("email2").value.trim();
                if (!name || !email) {
                  resultEl.textContent = "表示名とメールアドレスを入力してください。";
                  resultEl.style.color = "#c00";
                  return;
                }
                resultEl.textContent = "登録中…";
                resultEl.style.color = "";
                var btn = form.querySelector('button[type="submit"]');
                if (btn) btn.disabled = true;
                fetch("/api/creators/register", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ name: name, email: email }),
                })
                  .then(function (r) {
                    if (r.status === 201) {
                      return r.json().then(function (data) {
                        var creatorId = data && data.creator && data.creator.id;
                        if (creatorId) {
                          try { localStorage.setItem("buildy_creator_id", creatorId); } catch (_) {}
                          var base = window.location.pathname.replace(/[^/]*$/, "") || "/";
                          if (!base.endsWith("/")) base = base + "/";
                          window.location.replace(window.location.origin + base + "creator-dashboard.html?registered=1");
                        } else {
                          resultEl.textContent = "登録しましたが、ページの取得に失敗しました。";
                          resultEl.style.color = "#c00";
                          if (btn) btn.disabled = false;
                        }
                      }).catch(function () {
                        resultEl.textContent = "登録に成功しました。マイページを開いてください。";
                        resultEl.style.color = "";
                        if (btn) btn.disabled = false;
                      });
                      return;
                    }
                    if (!r.ok) return r.text().then(function (t) { throw new Error(r.status + " " + t); });
                    return r.json().then(function (data) {
                      resultEl.textContent = "エラー: " + (data.error || "登録に失敗しました");
                      resultEl.style.color = "#c00";
                      if (btn) btn.disabled = false;
                    });
                  })
                  .catch(function (err) {
                    resultEl.textContent = "通信エラーです。(" + (err.message || "") + ")";
                    resultEl.style.color = "#c00";
                    if (btn) btn.disabled = false;
                  });
              });
            }
          })
          .catch(function () {
            hideRegisterLoading();
            withAuth.style.display = "none";
            if (noAuth) noAuth.style.display = "block";
            if (form) {
              form.addEventListener("submit", function (e) {
                e.preventDefault();
                var name = document.getElementById("name2").value.trim();
                var email = document.getElementById("email2").value.trim();
                if (!name || !email) {
                  resultEl.textContent = "表示名とメールアドレスを入力してください。";
                  resultEl.style.color = "#c00";
                  return;
                }
                resultEl.textContent = "登録中…";
                resultEl.style.color = "";
                var btn = form.querySelector('button[type="submit"]');
                if (btn) btn.disabled = true;
                fetch("/api/creators/register", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ name: name, email: email }),
                })
                  .then(function (r) {
                    if (r.status === 201) {
                      return r.json().then(function (data) {
                        var creatorId = data && data.creator && data.creator.id;
                        if (creatorId) {
                          try { localStorage.setItem("buildy_creator_id", creatorId); } catch (_) {}
                          var base = window.location.pathname.replace(/[^/]*$/, "") || "/";
                          if (!base.endsWith("/")) base = base + "/";
                          window.location.replace(window.location.origin + base + "creator-dashboard.html?registered=1");
                        } else {
                          resultEl.textContent = "登録しましたが、ページの取得に失敗しました。";
                          resultEl.style.color = "#c00";
                          if (btn) btn.disabled = false;
                        }
                      }).catch(function () {
                        resultEl.textContent = "登録に成功しました。マイページを開いてください。";
                        resultEl.style.color = "";
                        if (btn) btn.disabled = false;
                      });
                      return;
                    }
                    if (!r.ok) return r.text().then(function (t) { throw new Error(r.status + " " + t); });
                    return r.json().then(function (data) {
                      resultEl.textContent = "エラー: " + (data.error || "登録に失敗しました");
                      resultEl.style.color = "#c00";
                      if (btn) btn.disabled = false;
                    });
                  })
                  .catch(function (err) {
                    resultEl.textContent = "通信エラーです。(" + (err.message || "") + ")";
                    resultEl.style.color = "#c00";
                    if (btn) btn.disabled = false;
                  });
              });
            }
          });
      })();
    </script>
  </body>
</html>
