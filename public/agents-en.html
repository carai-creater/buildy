<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agents | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">Home</a>
          <a href="./categories-en.html">Categories</a>
          <a href="./mypage-en.html">Your agents</a>
          <a href="./index-ja.html" class="page-lang">日本語</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>Agents</h1>

        <div id="agents-empty" class="page-empty" style="display: none;">
          <p>No agents here yet.</p>
          <p>
            <a href="./creators-register-en.html" class="btn primary-btn">Become a creator</a>,
            then <a href="./agent-add-en.html">list your first agent</a>.
          </p>
        </div>
        <div id="agents-grid" class="page-card-grid"></div>
      </section>
    </main>
    <script>
      (function () {
        var grid = document.getElementById("agents-grid");
        var empty = document.getElementById("agents-empty");
        fetch("/api/agents")
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var agents = data.agents || [];
            if (agents.length === 0) {
              empty.style.display = "block";
              return;
            }
            grid.innerHTML = agents
              .map(function (a) {
                return (
                  '<article class="page-agent-card">' +
                  '<span class="badge subtle">' +
                  escapeHtml(a.category || "Other") +
                  "</span>" +
                  "<h2>" +
                  escapeHtml(a.name) +
                  "</h2>" +
                  '<p class="page-agent-desc">' +
                  escapeHtml(a.shortDescription || "") +
                  "</p>" +
                  '<p class="page-agent-price">¥' +
                  (Number(a.pricePerRun) || 0) +
                  " / run</p>" +
                  '<a href="./pay-en.html?agent=' +
                  encodeURIComponent(a.id) +
                  '" class="btn primary-btn">Pay &amp; run</a>' +
                  (a.publicUiUrl
                    ? '<p class="page-note" style="margin-top:0.65rem;font-size:13px"><a href="' +
                      String(a.publicUiUrl).replace(/&/g, "&amp;").replace(/"/g, "&quot;") +
                      '" target="_blank" rel="noopener noreferrer">Open in creator’s app</a> (after purchase)</p>'
                    : "") +
                  "</article>"
                );
              })
              .join("");
          })
          .catch(function () {
            empty.style.display = "block";
            empty.innerHTML =
              "<p>We couldn't load agents.</p><p><a href=\"./creators-register-en.html\">Become a creator</a> · <a href=\"./agent-add-en.html\">List an agent</a></p>";
          });
        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
