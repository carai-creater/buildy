<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agents | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">Home</a>
          <a href="./categories-en.html">Categories</a>
          <a href="./mypage-en.html">My page</a>
          <a href="./index-ja.html" class="page-lang">日本語</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>Agents</h1>
        <p class="page-lead">
          Only creator-published agents are listed. Paid runs use
          <a href="https://tempo.xyz/" target="_blank" rel="noopener noreferrer">Tempo</a>
          checkout. Free agents still complete checkout (no on-chain payment).
        </p>

        <div id="agents-empty" class="page-empty" style="display: none;">
          <p>No creator-published agents yet.</p>
          <p>
            <a href="./creators-register-en.html" class="btn primary-btn">Sign up as a creator</a>
            then <a href="./agent-add-en.html">add an agent</a>.
          </p>
        </div>
        <div id="agents-grid" class="page-card-grid"></div>
      </section>
    </main>
    <script>
      (function () {
        var grid = document.getElementById("agents-grid");
        var empty = document.getElementById("agents-empty");
        fetch("/api/agents")
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var agents = data.agents || [];
            if (agents.length === 0) {
              empty.style.display = "block";
              return;
            }
            grid.innerHTML = agents
              .map(function (a) {
                return (
                  '<article class="page-agent-card">' +
                  '<span class="badge subtle">' +
                  escapeHtml(a.category || "Other") +
                  "</span>" +
                  "<h2>" +
                  escapeHtml(a.name) +
                  "</h2>" +
                  '<p class="page-agent-desc">' +
                  escapeHtml(a.shortDescription || "") +
                  "</p>" +
                  '<p class="page-agent-price">¥' +
                  (Number(a.pricePerRun) || 0) +
                  " / run</p>" +
                  '<a href="./pay-en.html?agent=' +
                  encodeURIComponent(a.id) +
                  '" class="btn primary-btn">Pay with Tempo to use</a>' +
                  "</article>"
                );
              })
              .join("");
          })
          .catch(function () {
            empty.style.display = "block";
            empty.innerHTML =
              "<p>Could not load the list.</p><p><a href=\"./creators-register-en.html\">Sign up</a> · <a href=\"./agent-add-en.html\">Add agent</a></p>";
          });
        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
