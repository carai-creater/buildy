<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>エージェントを利用 | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index-ja.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./agents.html">一覧</a>
          <a href="./agent-use-en.html" class="page-lang">English</a>
        </nav>
      </header>
      <section class="page-main page-main--narrow">
        <div id="state-loading" class="page-empty"><p>読み込み中…</p></div>
        <div id="state-need-pay" class="page-card" style="display: none;">
          <h1 id="np-title"></h1>
          <p>
            無料・有料どちらも、先にチェックアウトページで手続きが必要です（無料はオンチェーン送金なし、有料は Tempo で支払い）。
          </p>
          <p><a id="np-pay" href="#" class="btn primary-btn">チェックアウトへ</a></p>
        </div>

        <div id="ui-wrap-chat" style="display: none;">
          <h1 id="ch-title"></h1>
          <p id="ch-sub" class="page-lead" style="font-size: 14px;"></p>
          <div id="ch-log" class="page-card agent-use-log"></div>
          <label for="ch-input">メッセージ</label>
          <textarea id="ch-input" rows="3" style="width: 100%; max-width: 42rem; padding: 0.5rem; margin-top: 0.35rem;"></textarea>
          <p style="margin-top: 0.75rem;">
            <button type="button" id="ch-send" class="btn primary-btn">送信</button>
          </p>
          <p id="ch-err" class="agent-use-err"></p>
        </div>

        <div id="ui-wrap-research" style="display: none;">
          <p class="badge accent" style="margin-bottom: 0.5rem;">リサーチ用 UI</p>
          <h1 id="rs-title"></h1>
          <p id="rs-sub" class="page-lead agent-use-research-lead"></p>
          <label for="rs-input">調査テーマ / 質問</label>
          <textarea id="rs-input" rows="6" class="agent-use-research-input"></textarea>
          <p style="margin-top: 0.75rem;">
            <button type="button" id="rs-send" class="btn primary-btn">リサーチを実行</button>
          </p>
          <h2 class="agent-use-h2" style="margin-top: 1.5rem; font-size: 1rem;">結果</h2>
          <div id="rs-log" class="page-card agent-use-research-log"></div>
          <p id="rs-err" class="agent-use-err"></p>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var agentId = params.get("agent");
        if (!agentId) {
          document.getElementById("state-loading").innerHTML = "<p>URL に ?agent= を指定してください。</p>";
          return;
        }

        function tokenKey() {
          return "buildy_tempo_access_" + agentId;
        }

        function getToken() {
          try {
            return sessionStorage.getItem(tokenKey());
          } catch (_) {
            return null;
          }
        }

        function runExecute(userText, logEl, errEl, appendUserPrefix) {
          errEl.textContent = "";
          if (appendUserPrefix) {
            logEl.textContent += "\n\n" + appendUserPrefix + "\n" + userText;
          }
          var token = getToken();
          var headers = { "Content-Type": "application/json" };
          if (token) headers["X-Buildy-Access-Token"] = token;
          return fetch("/api/agent/execute", {
            method: "POST",
            headers: headers,
            body: JSON.stringify({
              agent_id: agentId,
              user_message: userText,
              stream: false,
            }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, j: j, status: r.status };
              });
            })
            .then(function (_ref) {
              if (!_ref.ok) {
                errEl.textContent = _ref.j.message || _ref.j.error || "実行に失敗しました (HTTP " + _ref.status + ")";
                return;
              }
              logEl.textContent += "\n\n【出力】\n" + (_ref.j.content || "");
            })
            .catch(function () {
              errEl.textContent = "通信エラーです。";
            });
        }

        fetch("/api/agents/" + encodeURIComponent(agentId))
          .then(function (r) {
            if (!r.ok) throw new Error("not found");
            return r.json();
          })
          .then(function (data) {
            var agent = data.agent;
            if (!agent) throw new Error("not found");
            var token = getToken();
            document.getElementById("state-loading").style.display = "none";

            if (!token) {
              var np = document.getElementById("state-need-pay");
              np.style.display = "block";
              document.getElementById("np-title").textContent = agent.name;
              document.getElementById("np-pay").href = "./pay.html?agent=" + encodeURIComponent(agentId);
              return;
            }

            var variant = agent.uiVariant || "chat";
            if (variant === "research") {
              document.getElementById("ui-wrap-research").style.display = "block";
              document.getElementById("rs-title").textContent = agent.name;
              document.getElementById("rs-sub").textContent =
                "テーマや質問を入力してください。1 回の実行で利用権を 1 回消費します。表示価格: ¥" +
                (Number(agent.pricePerRun) || 0) +
                "（このブラウザではチェックアウト済み）。";
              document.getElementById("rs-send").addEventListener("click", function () {
                var text = document.getElementById("rs-input").value.trim();
                if (!text) return;
                runExecute(text, document.getElementById("rs-log"), document.getElementById("rs-err"), "【テーマ】");
                document.getElementById("rs-input").value = "";
              });
            } else {
              document.getElementById("ui-wrap-chat").style.display = "block";
              document.getElementById("ch-title").textContent = agent.name;
              document.getElementById("ch-sub").textContent =
                "チャット UI · ¥" +
                (Number(agent.pricePerRun) || 0) +
                " · メッセージごとにチェックアウトの利用権を 1 回消費します。";
              document.getElementById("ch-send").addEventListener("click", function () {
                var text = document.getElementById("ch-input").value.trim();
                if (!text) return;
                runExecute(text, document.getElementById("ch-log"), document.getElementById("ch-err"), "【あなた】");
                document.getElementById("ch-input").value = "";
              });
            }
          })
          .catch(function () {
            document.getElementById("state-loading").innerHTML = "<p>エージェントが見つかりません。</p>";
          });
      })();
    </script>
  </body>
</html>
