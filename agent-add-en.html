<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add agent | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./index.html">Home</a>
          <a href="./agents-en.html">Agents</a>
          <a href="./creator-dashboard-en.html">Dashboard</a>
          <a href="./creators-register-en.html">Creator signup</a>
          <a href="./index-ja.html" class="page-lang">日本語</a>
        </nav>
      </header>
      <section class="page-main">
        <h1>Add agent</h1>
        <p class="page-lead">List a new AI agent on the marketplace. <a href="./creators-register-en.html">Creator signup</a> is required first. You can pull details from a GitHub repo.</p>
        <div class="page-form" style="max-width: 32rem; margin-bottom: 1.5rem;">
          <h2 style="font-size: 1rem; margin-bottom: 0.5rem;">Import from GitHub (optional)</h2>
          <label for="github-repo">GitHub repo URL or owner/repo</label>
          <div style="display: flex; gap: 0.5rem; align-items: flex-start; flex-wrap: wrap;">
            <input id="github-repo" type="text" placeholder="https://github.com/owner/repo or owner/repo" style="flex: 1; min-width: 12rem;" />
            <button type="button" id="github-fetch-btn" class="btn primary-btn">Fetch repo</button>
          </div>
          <p id="github-fetch-result" style="margin-top: 0.5rem; font-size: 14px; color: var(--text-sub);"></p>
        </div>
        <form id="agent-form" class="page-form" style="max-width: 32rem;">
          <label for="name">Agent name *</label>
          <input id="name" name="name" type="text" required placeholder="e.g. Market research agent" />
          <label for="category">Category</label>
          <input id="category" name="category" type="text" placeholder="e.g. Research" />
          <label for="shortDescription">Short description</label>
          <textarea id="shortDescription" name="shortDescription" rows="2" placeholder="What this agent does"></textarea>
          <label for="pricePerRun">Price per run (JPY)</label>
          <input id="pricePerRun" name="pricePerRun" type="number" min="0" value="0" />
          <label for="system_prompt">System prompt (for the LLM)</label>
          <textarea id="system_prompt" name="system_prompt" rows="4" placeholder="You are a helpful assistant. ..."></textarea>
          <label for="creator_id">Creator ID (auto-filled when logged in; edit only for another account)</label>
          <input id="creator_id" name="creator_id" type="text" placeholder="uuid" autocomplete="off" />
          <input id="github_repo" name="github_repo" type="hidden" />
          <button type="submit" class="btn primary-btn">Add agent</button>
        </form>
        <p id="agent-result" style="margin-top: 1rem;"></p>
      </section>
    </main>
    <script src="./auth-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var el = document.getElementById("creator_id");
        if (!el) return;
        var saved =
          typeof window.buildyGetStoredCreatorId === "function"
            ? window.buildyGetStoredCreatorId()
            : (function () {
                try {
                  return sessionStorage.getItem("buildy_creator_id") || localStorage.getItem("buildy_creator_id") || "";
                } catch (_) {
                  return "";
                }
              })();
        if (saved) {
          el.placeholder = saved;
          if (!el.value.trim()) el.value = saved;
        }
      })();
      const githubRepoInput = document.getElementById("github-repo");
      const githubFetchBtn = document.getElementById("github-fetch-btn");
      const githubFetchResult = document.getElementById("github-fetch-result");
      const hiddenGithubRepo = document.getElementById("github_repo");
      if (githubFetchBtn && githubRepoInput) {
        githubFetchBtn.addEventListener("click", function () {
          var url = githubRepoInput.value.trim().replace(/\.git$/i, "").replace(/\/+$/, "").trim();
          if (!url) {
            githubFetchResult.textContent = "Enter a URL or owner/repo.";
            return;
          }
          githubFetchResult.textContent = "Fetching…";
          githubFetchBtn.disabled = true;
          const q = "url=" + encodeURIComponent(url);
          fetch("/api/github/repo?" + q)
            .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
            .then(function (_) {
              var r = _.ok ? null : _.data;
              if (r && r.error) {
                githubFetchResult.textContent = "Error: " + r.error;
                githubFetchResult.style.color = "#c00";
                return;
              }
              var d = _.data;
              if (d.name) document.getElementById("name").value = d.name;
              if (d.description) document.getElementById("shortDescription").value = d.description;
              if (d.full_name) hiddenGithubRepo.value = d.full_name;
              else if (d.html_url) hiddenGithubRepo.value = d.html_url;
              githubFetchResult.textContent = "Loaded: " + (d.full_name || d.name);
              githubFetchResult.style.color = "";
            })
            .catch(function () {
              githubFetchResult.textContent = "Network error.";
              githubFetchResult.style.color = "#c00";
            })
            .finally(function () { githubFetchBtn.disabled = false; });
        });
      }
      document.getElementById("agent-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var creatorId = document.getElementById("creator_id").value.trim();
        if (!creatorId && typeof window.buildyGetStoredCreatorId === "function") {
          creatorId = window.buildyGetStoredCreatorId();
        }
        if (!creatorId) {
          try {
            creatorId = sessionStorage.getItem("buildy_creator_id") || localStorage.getItem("buildy_creator_id") || "";
          } catch (_) {}
        }
        creatorId = creatorId ? creatorId.trim() : "";
        var payload = {
          name: document.getElementById("name").value.trim(),
          category: document.getElementById("category").value.trim() || undefined,
          shortDescription: document.getElementById("shortDescription").value.trim() || undefined,
          pricePerRun: parseInt(document.getElementById("pricePerRun").value, 10) || 0,
          system_prompt: document.getElementById("system_prompt").value.trim() || undefined,
          creator_id: creatorId || undefined,
          github_repo: (hiddenGithubRepo && hiddenGithubRepo.value) ? hiddenGithubRepo.value.trim() : undefined,
        };
        var resultEl = document.getElementById("agent-result");
        resultEl.textContent = "Adding…";
        resultEl.style.color = "";
        fetch("/api/config")
          .then(function (r) { return r.json(); })
          .then(function (config) {
            if (!config.supabaseUrl || !config.supabaseAnonKey) {
              return Promise.resolve({ token: null });
            }
            var storage =
              typeof window.buildyGetAuthStorage === "function" ? window.buildyGetAuthStorage() : localStorage;
            var sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey, {
              auth: { storage: storage, persistSession: true, autoRefreshToken: true },
            });
            return sb.auth.getSession().then(function (res) {
              var tok = res.data && res.data.session && res.data.session.access_token;
              return { token: tok || null };
            });
          })
          .then(function (ctx) {
            if (!payload.creator_id && !ctx.token) {
              resultEl.textContent =
                "No creator ID. Sign in to the dashboard or paste the ID from creator signup.";
              resultEl.style.color = "#c00";
              return;
            }
            var headers = { "Content-Type": "application/json" };
            if (ctx.token) headers["Authorization"] = "Bearer " + ctx.token;
            return fetch("/api/agents", { method: "POST", headers: headers, body: JSON.stringify(payload) });
          })
          .then(function (r) {
            if (!r) return;
            return r.json();
          })
          .then(function (data) {
            if (!data) return;
            if (data.agent) {
              resultEl.innerHTML =
                "Added: " +
                data.agent.name +
                " → <a href=\"./creator-dashboard-en.html\">Dashboard</a> / <a href=\"./agents-en.html\">List</a>";
            } else {
              resultEl.textContent = "Error: " + (data.error || "Could not add agent");
              resultEl.style.color = "#c00";
            }
          })
          .catch(function () {
            resultEl.textContent = "Network error.";
            resultEl.style.color = "#c00";
          });
      });
    </script>
  </body>
</html>
