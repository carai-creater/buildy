<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Use agent | Buildy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page page--agent-use">
      <header class="page-header">
        <a href="./index.html" class="page-logo">Buildy</a>
        <nav class="page-nav">
          <a href="./agents-en.html">Agents</a>
          <a href="./agent-use.html" class="page-lang">日本語</a>
        </nav>
      </header>
      <section class="page-main agent-use-main">
        <div id="state-loading" class="agent-use-loading"><p>Loading…</p></div>
        <div id="state-need-pay" class="agent-use-card agent-use-card--notice" style="display: none;">
          <h1 class="agent-use-heading" id="np-title"></h1>
          <p class="agent-use-muted" id="np-muted">Complete checkout to use this agent.</p>
          <p style="margin-top: 1.25rem;">
            <a id="np-pay" href="#" class="btn primary-btn">Go to checkout</a>
          </p>
        </div>

        <div id="creator-ui-banner" class="agent-use-creator-banner" style="display: none;">
          <p>This agent also has a <strong>creator-hosted app</strong>. You can keep using Buildy below, or open their UI in a new tab (same access).</p>
          <button type="button" id="creator-ui-open-btn" class="btn secondary-btn">Open creator app</button>
        </div>

        <div id="ui-wrap-chat" class="agent-use-workspace" style="display: none;">
          <header class="agent-use-header">
            <h1 class="agent-use-heading" id="ch-title"></h1>
          </header>
          <div class="agent-use-output-card">
            <p id="ch-placeholder" class="agent-use-placeholder">The assistant reply will appear here.</p>
            <div id="ch-log" class="agent-use-output" aria-live="polite"></div>
          </div>
          <div class="agent-use-compose">
            <label class="visually-hidden" for="ch-input">Your message</label>
            <textarea id="ch-input" class="agent-use-textarea" rows="2" placeholder="Message…" autocomplete="off"></textarea>
            <button type="button" id="ch-send" class="btn primary-btn agent-use-send">Send</button>
          </div>
          <p id="ch-err" class="agent-use-err" role="alert"></p>
        </div>

        <div id="ui-wrap-research" class="agent-use-workspace" style="display: none;">
          <header class="agent-use-header">
            <h1 class="agent-use-heading" id="rs-title"></h1>
          </header>
          <div class="agent-use-output-card">
            <p id="rs-placeholder" class="agent-use-placeholder">The result will appear here.</p>
            <div id="rs-log" class="agent-use-output" aria-live="polite"></div>
          </div>
          <div class="agent-use-compose">
            <label class="visually-hidden" for="rs-input">Research request</label>
            <textarea id="rs-input" class="agent-use-textarea agent-use-textarea--tall" rows="4" placeholder="What should we look into?" autocomplete="off"></textarea>
            <button type="button" id="rs-send" class="btn primary-btn agent-use-send">Run</button>
          </div>
          <p id="rs-err" class="agent-use-err" role="alert"></p>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var agentId = params.get("agent");
        if (!agentId) {
          document.getElementById("state-loading").innerHTML = "<p>Add <code>?agent=</code> to the URL.</p>";
          return;
        }

        function tokenKey() {
          return "buildy_tempo_access_" + agentId;
        }

        function getToken() {
          try {
            return sessionStorage.getItem(tokenKey());
          } catch (_) {
            return null;
          }
        }

        function openCreatorAppTab(publicUiUrl, accessToken, agId) {
          try {
            var u = new URL(String(publicUiUrl).trim());
            u.hash =
              "buildy_access=" + encodeURIComponent(accessToken) + "&buildy_agent=" + encodeURIComponent(agId);
            window.open(u.toString(), "_blank", "noopener,noreferrer");
          } catch (e) {}
        }

        function runExecute(userText, logEl, errEl, placeholderEl, sendBtn) {
          errEl.textContent = "";
          if (sendBtn) sendBtn.disabled = true;
          var token = getToken();
          var headers = { "Content-Type": "application/json" };
          if (token) headers["X-Buildy-Access-Token"] = token;
          return fetch("/api/agent/execute", {
            method: "POST",
            headers: headers,
            body: JSON.stringify({
              agent_id: agentId,
              user_message: userText,
              stream: false,
            }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                return { ok: r.ok, j: j, status: r.status };
              });
            })
            .then(function (_ref) {
              if (!_ref.ok) {
                errEl.textContent = _ref.j.message || _ref.j.error || "Run failed (HTTP " + _ref.status + ")";
                return;
              }
              var out = (_ref.j.content || "").trim();
              if (!out) return;
              if (placeholderEl) placeholderEl.style.display = "none";
              if (logEl.textContent.trim()) {
                logEl.textContent += "\n\n" + out;
              } else {
                logEl.textContent = out;
              }
            })
            .catch(function () {
              errEl.textContent = "Network error.";
            })
            .finally(function () {
              if (sendBtn) sendBtn.disabled = false;
            });
        }

        fetch("/api/agents/" + encodeURIComponent(agentId))
          .then(function (r) {
            if (!r.ok) throw new Error("not found");
            return r.json();
          })
          .then(function (data) {
            var agent = data.agent;
            if (!agent) throw new Error("not found");
            var token = getToken();
            document.getElementById("state-loading").style.display = "none";

            var pui = agent.publicUiUrl && String(agent.publicUiUrl).trim();

            if (!token) {
              document.getElementById("state-need-pay").style.display = "block";
              document.getElementById("np-title").textContent = agent.name;
              document.getElementById("np-pay").href = "./pay-en.html?agent=" + encodeURIComponent(agentId);
              var npMuted = document.getElementById("np-muted");
              if (npMuted) {
                if (pui) {
                  npMuted.innerHTML =
                    'Complete checkout on Buildy first. Then use this page or the <a href="' +
                    pui.replace(/"/g, "&quot;") +
                    '" target="_blank" rel="noopener noreferrer">creator app</a>.';
                } else {
                  npMuted.textContent = "Complete checkout to use this agent.";
                }
              }
              return;
            }

            function wireCreatorBanner() {
              if (!pui) return;
              var b = document.getElementById("creator-ui-banner");
              if (!b) return;
              b.style.display = "block";
              var btn = document.getElementById("creator-ui-open-btn");
              if (btn) {
                btn.onclick = function () {
                  openCreatorAppTab(pui, getToken(), agentId);
                };
              }
            }

            var variant = agent.uiVariant || "chat";
            if (variant === "research") {
              wireCreatorBanner();
              document.getElementById("ui-wrap-research").style.display = "flex";
              document.getElementById("rs-title").textContent = agent.name;
              var rsBtn = document.getElementById("rs-send");
              document.getElementById("rs-send").addEventListener("click", function () {
                var text = document.getElementById("rs-input").value.trim();
                if (!text) return;
                runExecute(
                  text,
                  document.getElementById("rs-log"),
                  document.getElementById("rs-err"),
                  document.getElementById("rs-placeholder"),
                  rsBtn
                );
                document.getElementById("rs-input").value = "";
              });
            } else {
              wireCreatorBanner();
              document.getElementById("ui-wrap-chat").style.display = "flex";
              document.getElementById("ch-title").textContent = agent.name;
              var chBtn = document.getElementById("ch-send");
              document.getElementById("ch-send").addEventListener("click", function () {
                var text = document.getElementById("ch-input").value.trim();
                if (!text) return;
                runExecute(
                  text,
                  document.getElementById("ch-log"),
                  document.getElementById("ch-err"),
                  document.getElementById("ch-placeholder"),
                  chBtn
                );
                document.getElementById("ch-input").value = "";
              });
            }
          })
          .catch(function () {
            document.getElementById("state-loading").innerHTML = "<p>Agent not found.</p>";
          });
      })();
    </script>
  </body>
</html>
